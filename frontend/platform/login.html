<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');}catch(e){}})();</script>
<title>Platform Login — Hospital Chatbot</title>
<link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page">
    <div class="theme-toggle-corner">
        <div class="theme-toggle" data-theme-toggle style="margin-bottom:0;">
            <span data-theme-icon>🌙</span>
            <div class="theme-switch" data-theme-switch><div class="theme-knob"></div></div>
        </div>
    </div>
    <div class="login-card">
        <h1>Platform Login</h1>
        <p>Super Admin access only</p>
        <form id="platformLoginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required autocomplete="current-password">
                    <button type="button" class="password-toggle-btn" data-toggle-for="password" aria-label="Show password">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="checkbox-row" style="margin: 0 0 1rem;">
                <input type="checkbox" id="rememberMe" checked>
                <label for="rememberMe">Remember me</label>
            </div>
            <button type="submit" class="btn btn-primary" id="loginSubmitBtn">Log In</button>
            <div class="error-text" id="errorText"></div>
        </form>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="js/platform-auth.js"></script>
    <script src="js/platform-login.js"></script>
</body>
</html>
