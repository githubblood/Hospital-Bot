<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');}catch(e){}})();</script>
<title>Create Hospital Account — Hospital Chatbot</title>
<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
<link rel="stylesheet" href="css/style.css">
<style>
    /* Local to this page, matching the exact same pattern doctors.html
       already uses for .form-row (this project keeps 2-column form-row
       layouts as a per-page inline rule, not a shared one). */
    .form-row { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .form-row .form-group { flex: 1; min-width: 0; margin-bottom: 0; }
    @media (max-width: 700px) { .form-row { flex-direction: column; gap: 0; } }
    .register-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; position: relative; }
</style>
</head>
<body class="register-page">
    <div class="theme-toggle-corner">
        <div class="theme-toggle" data-theme-toggle style="margin-bottom:0;">
            <span data-theme-icon>🌙</span>
            <div class="theme-switch" data-theme-switch><div class="theme-knob"></div></div>
        </div>
    </div>

    <div class="auth-card-wide">
        <h1>Create Hospital Account</h1>
        <p>Set up your hospital's own workspace — doctors, patients, appointments and staff all stay private to your account.</p>

        <form id="registerForm" autocomplete="off">
            <div class="auth-section-title">🏥 Hospital Information</div>

            <div class="form-row">
                <div class="form-group">
                    <label for="hospitalName">Hospital Name</label>
                    <input type="text" id="hospitalName" placeholder="City Care Hospital" required>
                </div>
                <div class="form-group">
                    <label for="hospitalEmail">Hospital Email</label>
                    <input type="email" id="hospitalEmail" placeholder="info@hospital.com" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="hospitalPhone">Phone Number</label>
                    <input type="tel" id="hospitalPhone" placeholder="+91 98765 43210" required>
                </div>
                <div class="form-group">
                    <label for="logoInput">Hospital Logo (optional)</label>
                    <div class="logo-upload">
                        <div class="logo-preview" id="logoPreview">🏥</div>
                        <div>
                            <button type="button" class="btn btn-outline logo-upload-btn">
                                Choose Logo
                                <input type="file" id="logoInput" accept="image/png,image/jpeg,image/webp,image/svg+xml">
                            </button>
                            <div class="logo-upload-hint">PNG, JPEG, WEBP or SVG — up to 2MB</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" placeholder="123 Main Street" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="Mumbai" required>
                </div>
                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" placeholder="Maharashtra" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="country">Country</label>
                    <input type="text" id="country" placeholder="India" value="India" required>
                </div>
                <div class="form-group">
                    <label for="pincode">Pincode</label>
                    <input type="text" id="pincode" placeholder="400001" required>
                </div>
            </div>

            <div class="auth-section-title">👤 Admin Information</div>

            <div class="form-row">
                <div class="form-group">
                    <label for="adminName">Full Name</label>
                    <input type="text" id="adminName" placeholder="Dr. Asha Verma" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="adminEmail">Admin Email</label>
                    <input type="email" id="adminEmail" placeholder="admin@hospital.com" required autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <label for="adminPhone">Mobile Number</label>
                <input type="tel" id="adminPhone" placeholder="+91 98765 43210" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required minlength="8" autocomplete="new-password">
                        <button type="button" class="password-toggle-btn" data-toggle-for="password" aria-label="Show password">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <div class="strength-meter" id="strengthMeter">
                        <div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div>
                    </div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" required minlength="8" autocomplete="new-password">
                        <button type="button" class="password-toggle-btn" data-toggle-for="confirmPassword" aria-label="Show password">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="checkbox-row">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">I agree to the Terms &amp; Conditions and Privacy Policy</label>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">Create Hospital Account</button>
            <div class="error-text" id="errorText"></div>
            <div class="success-text" id="successText"></div>
        </form>

        <div class="auth-switch-link">Already have an account? <a href="index.html" id="backToLoginLink">Back to Login</a></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
