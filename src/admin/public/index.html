<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');}catch(e){}})();</script>
<title>Admin Login — Hospital Chatbot</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="theme-toggle-corner">
        <div class="theme-toggle" data-theme-toggle style="margin-bottom:0;">
            <span data-theme-icon>🌙</span>
            <div class="theme-switch" data-theme-switch><div class="theme-knob"></div></div>
        </div>
    </div>
    <div class="login-card">
        <h1>Admin Login</h1>
        <p>Hospital staff dashboard</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required autocomplete="current-password">
                    <button type="button" class="password-toggle-btn" data-toggle-for="password" aria-label="Show password">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="checkbox-row" style="margin: 0 0 1rem;">
                <input type="checkbox" id="rememberMe" checked>
                <label for="rememberMe">Remember me</label>
            </div>
            <button type="submit" class="btn btn-primary" id="loginSubmitBtn">Log In</button>
            <div class="error-text" id="errorText"></div>
        </form>
        <button type="button" class="forgot-link" id="forgotLink">Forgot password?</button>
        <div class="auth-switch-link">New hospital? <a href="register.html">Create Hospital Account</a></div>
    </div>

    <!-- Forgot Password modal: step 1 (email) -> step 2 (code + new password) -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal-box">
            <h3>🔐 Reset Password</h3>

            <div class="reset-step active" id="stepEmail">
                <p>Enter your admin email. If it has a phone number on file, we'll WhatsApp you a reset code.</p>
                <div class="form-group">
                    <label for="forgotEmail">Email</label>
                    <input type="email" id="forgotEmail" required autocomplete="username">
                </div>
                <div class="error-text" id="forgotError"></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" id="forgotCancelBtn">Cancel</button>
                    <button type="button" class="btn btn-primary" id="sendCodeBtn">Send Reset Code</button>
                </div>
            </div>

            <div class="reset-step" id="stepReset">
                <p id="codeSentMsg" class="success-text"></p>
                <div class="form-group">
                    <label for="resetCode">Reset Code</label>
                    <input type="text" id="resetCode" inputmode="numeric" maxlength="6" placeholder="6-digit code" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" required minlength="6" autocomplete="new-password">
                        <button type="button" class="password-toggle-btn" data-toggle-for="newPassword" aria-label="Show password">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="error-text" id="resetError"></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" id="resendCodeBtn">Resend Code</button>
                    <button type="button" class="btn btn-primary" id="confirmResetBtn">Reset Password</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
