<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');}catch(e){}})();</script>
<title>Hospitals — Platform Admin</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../css/style.css">
<style>
    .filters { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .filters select, .filters input {
        padding: 0.5rem 0.65rem; border: 1px solid var(--border); border-radius: 6px;
        font-size: 0.85rem; background: var(--card-bg); color: var(--text-primary);
    }
    .filters input[type="text"] { flex: 1; min-width: 200px; }
    .action-btn {
        border: none; border-radius: 5px; padding: 0.3rem 0.65rem; font-size: 0.78rem;
        font-weight: 600; color: #fff; cursor: pointer; margin-right: 0.35rem; transition: var(--transition);
    }
    .action-btn:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.08); }
    .action-view { background: var(--primary); }
    .action-edit { background: var(--text-muted); }
    .action-suspend { background: var(--danger); }
    .action-activate { background: var(--success); }
    .badge-active { background: var(--success); }
    .badge-suspended { background: var(--danger); }
    .badge-healthy { background: var(--success); }
    .badge-warning { background: var(--warning); color: #4d3b06; }
    .badge-critical { background: var(--danger); }
    .actions-cell { display: flex; gap: 0.35rem; flex-wrap: wrap; }

    .pagination { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
    .pagination .info { font-size: 0.82rem; color: var(--text-muted); }
    .pagination .controls { display: flex; gap: 0.5rem; }
    .pagination button {
        border: 1px solid var(--border); background: var(--card-bg); color: var(--text-primary);
        border-radius: 6px; padding: 0.4rem 0.75rem; font-size: 0.82rem; cursor: pointer; transition: var(--transition);
    }
    .pagination button:hover:not(:disabled) { background: var(--primary-light); border-color: var(--primary); }
    .pagination button:disabled { opacity: 0.45; cursor: not-allowed; }

    .loading-state, .error-state { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); font-size: 0.9rem; }
    .loading-state .spinner {
        display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
        border-top-color: var(--primary); border-radius: 50%; animation: plat-spin 0.7s linear infinite; margin-bottom: 0.6rem;
    }
    @keyframes plat-spin { to { transform: rotate(360deg); } }
    .error-state { color: var(--danger-tint-text); }

    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .form-row .form-group { flex: 1; min-width: 160px; }

    @media (max-width: 480px) {
        .filters select, .filters input { flex: 1 1 100%; }
        .action-btn { min-height: 36px; }
    }
</style>
</head>
<body>
    <div class="app-shell">
        <div class="global-topbar">
            <button class="hamburger-btn" id="hamburgerBtn" type="button" aria-label="Open menu">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="brand">
                <div class="brand-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
                <span class="brand-name">Platform Admin</span>
            </div>
            <div class="global-search" id="platformSearchWrap">
                <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
                <input type="text" id="platformSearchInput" placeholder="Search hospitals, doctors, patients, staff...">
                <div class="dropdown-panel" id="platformSearchPanel" style="width:100%;"></div>
            </div>
            <div class="topbar-spacer"></div>
            <div class="topbar-actions">
                <button class="icon-btn" data-theme-toggle type="button" title="Toggle dark mode" aria-label="Toggle dark mode">
                    <span data-theme-icon>🌙</span>
                </button>
            </div>
        </div>
        <div class="shell-body">
            <div class="sidebar-overlay" id="sidebarOverlay"></div>
            <aside class="sidebar">
                <nav>
                    <a href="dashboard.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
                    <a href="hospitals.html" class="active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 9h1M9 13h1M14 9h1M14 13h1"/></svg>Hospitals</a>
                    <a href="plans.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><path d="M6 15h4"/></svg>Plans</a>
                    <a href="subscriptions.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Subscriptions</a>
                    <a href="audit-log.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/></svg>Activity Feed</a>
                    <a href="settings.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
                </nav>
                <div class="sidebar-user" id="sidebarUser">
                    <div class="user-info">
                        <div class="name" id="platformAdminName"></div>
                        <div class="email">Platform Super Admin</div>
                    </div>
                </div>
                <button type="button" class="sidebar-logout-btn" id="platformLogoutBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
                    Logout
                </button>
            </aside>
            <main class="main-content">
                <div class="topbar">
                    <h1>Hospitals</h1>
                </div>

                <div class="filters">
                    <input type="text" id="searchInput" placeholder="Search by name, email, or city…">
                    <select id="statusFilter">
                        <option value="">All statuses</option>
                        <option value="Active">Active</option>
                        <option value="Suspended">Suspended</option>
                    </select>
                    <button class="btn btn-primary" id="createHospitalBtn" type="button" style="width:auto;">+ Create Hospital</button>
                </div>

                <div class="card">
                    <div id="loadingState" class="loading-state"><div class="spinner"></div><div>Loading hospitals…</div></div>
                    <div id="errorState" class="error-state" style="display:none;"></div>
                    <div id="tableWrap" style="display:none;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th><th>Email</th><th>City</th><th>Status</th><th>Health</th>
                                    <th>Branches</th><th>Staff</th><th>WhatsApp</th><th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                        <div class="empty-state" id="emptyState" style="display:none;">No hospitals match these filters.</div>
                        <div class="pagination" id="pagination">
                            <div class="info" id="paginationInfo"></div>
                            <div class="controls">
                                <button type="button" id="prevPageBtn">&larr; Previous</button>
                                <button type="button" id="nextPageBtn">Next &rarr;</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Create/Edit Hospital modal -->
    <div class="modal-overlay" id="hospitalModal">
        <div class="modal-box">
            <h3 id="hospitalModalTitle">🏥 Create Hospital</h3>
            <div class="form-row">
                <div class="form-group"><label>Hospital Name</label><input type="text" id="fName"></div>
                <div class="form-group"><label>Hospital Email</label><input type="email" id="fEmail"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Hospital Phone</label><input type="text" id="fPhone"></div>
                <div class="form-group"><label>City</label><input type="text" id="fCity"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>State</label><input type="text" id="fState"></div>
                <div class="form-group"><label>Country</label><input type="text" id="fCountry"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Address</label><input type="text" id="fAddress"></div>
                <div class="form-group"><label>Pincode</label><input type="text" id="fPincode"></div>
            </div>
            <div id="createOnlyFields">
                <h4 style="margin: 1rem 0 0.5rem; font-size: 0.9rem; color: var(--text-muted);">First Admin Account</h4>
                <div class="form-row">
                    <div class="form-group"><label>Admin Name</label><input type="text" id="fAdminName"></div>
                    <div class="form-group"><label>Admin Email</label><input type="email" id="fAdminEmail"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Admin Phone</label><input type="text" id="fAdminPhone"></div>
                    <div class="form-group"><label>Admin Password</label><input type="password" id="fAdminPassword" autocomplete="new-password"></div>
                </div>
            </div>
            <div class="error-text" id="hospitalModalError"></div>
            <div class="modal-actions">
                <button type="button" class="btn btn-outline" id="hospitalModalCancelBtn">Cancel</button>
                <button type="button" class="btn btn-primary" id="hospitalModalSaveBtn">Save</button>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/escapeHtml.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/confirm.js"></script>
    <script src="js/platform-auth.js"></script>
    <script src="js/platform-search.js"></script>
    <script src="js/platform-hospitals.js"></script>
</body>
</html>
